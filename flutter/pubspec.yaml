name: lion_dance_kit
description: "Lion Dance Kit - percussion instrument simulator"
publish_to: 'none'
version: 0.9.0+12

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_soloud: ^4.0.2
  google_mobile_ads: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/drum.wav
    - assets/sounds/side.wav
    - assets/sounds/cymbal.wav
    - assets/sounds/cymbal2.wav
    - assets/sounds/gong2.wav
    - assets/images/final.jpg
    - assets/images/LionIcon.png
